name: ishtirakati
description: "اشتراكاتي - تتبّع اشتراكاتك الرقمية وتحكّم بمصروفك | تطبيق عربي أولًا للسوق السعودي والخليجي"
publish_to: 'none'
version: 16.0.1+45

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.2.3
  url_launcher: ^6.3.0
  http: ^1.2.0
  flutter_local_notifications: ^19.0.0
  flutter_timezone: ^4.0.0
  timezone: ^0.10.0
  enough_mail: ^2.1.6
  local_auth: ^2.3.0
  flutter_secure_storage: ^10.3.1
  cryptography: ^2.9.0
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  cloud_firestore: ^6.6.0
  firebase_app_check: ^0.4.5
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^8.1.0
  # Native iOS/iPadOS share sheet for encrypted backup and CSV exports.
  share_plus: 12.0.2
  # Native Files picker for restoring an encrypted JSON backup.
  file_selector: 1.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  ios: true
  image_path: "assets/icon/app_icon.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - lib/l10n/app_ar.arb
    - lib/l10n/app_en.arb
  fonts:
    - family: Tajawal
      fonts:
        - asset: assets/fonts/tajawal/Tajawal-Regular.ttf
          weight: 400
        - asset: assets/fonts/tajawal/Tajawal-Bold.ttf
          weight: 700
    - family: IBM Plex Sans Arabic
      fonts:
        - asset: assets/fonts/ibm_plex_sans_arabic/IBMPlexSansArabic-Regular.ttf
          weight: 400
        - asset: assets/fonts/ibm_plex_sans_arabic/IBMPlexSansArabic-SemiBold.ttf
          weight: 600
