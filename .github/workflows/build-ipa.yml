name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-ios:
    name: بناء IPA غير موقّع (يُوقَّع من ويندوز عبر Sideloadly)
    # Pin Xcode/macOS until Flutter's unsigned build is stable on macOS 26.
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: سحب الكود
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: تجهيز Flutter (قناة stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: استعادة إعدادات Firebase من GitHub Secrets
        run: |
          if [ -z "${{ secrets.GOOGLE_SERVICE_INFO_PLIST_B64 }}" ] || [ -z "${{ secrets.FIREBASE_OPTIONS_DART_B64 }}" ]; then
            echo "::error::Missing Firebase configuration secrets."
            exit 1
          fi
          printf '%s' '${{ secrets.GOOGLE_SERVICE_INFO_PLIST_B64 }}' | base64 -D > GoogleService-Info.plist
          printf '%s' '${{ secrets.FIREBASE_OPTIONS_DART_B64 }}' | base64 -D > lib/firebase_options.dart
          test -s GoogleService-Info.plist
          test -s lib/firebase_options.dart

      - name: توليد مجلد iOS
        run: flutter create . --platforms=ios --org com.basil --project-name ishtirakati

      - name: ضبط الحد الأدنى لنظام iOS
        run: |
          perl -0pi -e "s/^#?\\s*platform :ios, '[^']+'/platform :ios, '15.0'/m" ios/Podfile
          perl -pi -e 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]+;/IPHONEOS_DEPLOYMENT_TARGET = 15.0;/g' ios/Runner.xcodeproj/project.pbxproj

      - name: Configure Firebase and Google Sign-In
        run: |
          test -f GoogleService-Info.plist
          cp GoogleService-Info.plist ios/Runner/GoogleService-Info.plist
          CLIENT_ID=$(/usr/libexec/PlistBuddy -c 'Print :CLIENT_ID' GoogleService-Info.plist 2>/dev/null || true)
          SCHEME=$(/usr/libexec/PlistBuddy -c 'Print :REVERSED_CLIENT_ID' GoogleService-Info.plist 2>/dev/null || true)
          if [ -z "$SCHEME" ] && [ -f ios_url_scheme.txt ]; then
            SCHEME=$(cat ios_url_scheme.txt | tr -d '[:space:]')
          fi
          if [ -n "$CLIENT_ID" ] && [ "$CLIENT_ID" != "REPLACE_ME" ]; then
            /usr/libexec/PlistBuddy -c 'Delete :GIDClientID' ios/Runner/Info.plist || true
            /usr/libexec/PlistBuddy -c "Add :GIDClientID string $CLIENT_ID" ios/Runner/Info.plist
          fi
          if [ -n "$SCHEME" ] && [ "$SCHEME" != "REPLACE_ME" ]; then
            /usr/libexec/PlistBuddy -c 'Add :CFBundleURLTypes array' ios/Runner/Info.plist || true
            /usr/libexec/PlistBuddy -c 'Add :CFBundleURLTypes:0 dict' ios/Runner/Info.plist || true
            /usr/libexec/PlistBuddy -c 'Add :CFBundleURLTypes:0:CFBundleURLSchemes array' ios/Runner/Info.plist || true
            /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes:0 string $SCHEME" ios/Runner/Info.plist || true
          fi
          if [ -z "$CLIENT_ID" ] || [ -z "$SCHEME" ] || [ "$SCHEME" = "REPLACE_ME" ]; then
            echo "Google Sign-In needs CLIENT_ID and REVERSED_CLIENT_ID in GoogleService-Info.plist."
          fi

      - name: ضبط اسم التطبيق الظاهر على الجهاز
        run: |
          /usr/libexec/PlistBuddy -c 'Set :CFBundleDisplayName اشتراكاتي' ios/Runner/Info.plist \
            || /usr/libexec/PlistBuddy -c 'Add :CFBundleDisplayName string اشتراكاتي' ios/Runner/Info.plist
          /usr/libexec/PlistBuddy -c 'Print :CFBundleDisplayName' ios/Runner/Info.plist

      - name: صلاحية Face ID
        run: |
          /usr/libexec/PlistBuddy -c 'Add :NSFaceIDUsageDescription string نستخدم بصمة الوجه لحماية بيانات اشتراكاتك' ios/Runner/Info.plist || true

      - name: تفعيل Keychain للتخزين الآمن
        run: |
          for file in ios/Runner/DebugProfile.entitlements ios/Runner/Release.entitlements; do
            if [ -f "$file" ]; then
              /usr/libexec/PlistBuddy -c 'Add :keychain-access-groups array' "$file" 2>/dev/null || true
            fi
          done

      - name: توليد أيقونة التطبيق
        run: |
          flutter pub get
          dart run flutter_launcher_icons

      - name: حذف اختبار القالب الذي يولّده flutter create
        run: rm -f test/widget_test.dart

      - name: جلب الحزم
        run: flutter pub get

      - name: تشغيل الاختبارات
        run: flutter test

      - name: تجهيز Xcode للبناء غير الموقع
        run: |
          # Flutter 3.44 requires a non-empty team in the Xcode project even when
          # code signing is disabled. This placeholder never signs the application.
          sed -i '' '/PRODUCT_BUNDLE_IDENTIFIER = com.basil.ishtirakati;/a\
          \                DEVELOPMENT_TEAM = 0000000000;' ios/Runner.xcodeproj/project.pbxproj

      - name: بناء iOS بدون توقيع
        id: flutter-ios-build
        run: |
          flutter build ios --release --no-codesign --obfuscate --split-debug-info=build/ios-symbols

      - name: التحقق من حزمة iOS غير الموقعة
        run: |
          # Flutter 3.44 can finish Xcode successfully, then reject the unsigned
          # app during its signing check. Locate the produced bundle before failing.
          runner_app="$(find build/ios "$HOME/Library/Developer/Xcode/DerivedData" \
            -type d -path '*/Release-iphoneos/Runner.app' -print -quit 2>/dev/null || true)"
          if [ -z "$runner_app" ]; then
            echo "Runner.app was not produced. Available iOS app bundles:"
            find build/ios "$HOME/Library/Developer/Xcode/DerivedData" \
              -type d -name '*.app' -print 2>/dev/null || true
            exit 1
          fi

          mkdir -p build/ios/iphoneos
          if [ "$runner_app" != "build/ios/iphoneos/Runner.app" ]; then
            rm -rf build/ios/iphoneos/Runner.app
            cp -R "$runner_app" build/ios/iphoneos/Runner.app
          fi

          test -f build/ios/iphoneos/Runner.app/Info.plist
          test -x build/ios/iphoneos/Runner.app/Runner
          echo "Unsigned Runner.app was built successfully."

      - name: تغليف IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -qr Ishtirakati-unsigned.ipa Payload
          ls -lh Ishtirakati-unsigned.ipa

      - name: رفع الملف الناتج
        uses: actions/upload-artifact@v6
        with:
          name: Ishtirakati-unsigned-ipa
          path: Ishtirakati-unsigned.ipa
          retention-days: 30

      - name: رفع رموز فك التشويش الخاصة بالمطور
        uses: actions/upload-artifact@v6
        with:
          name: Ishtirakati-iOS-symbols
          path: build/ios-symbols
          retention-days: 30
